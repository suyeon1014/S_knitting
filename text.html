<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 뜨개 도안 생성기 - 글자</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🧶 뜨개 도안 생성기</h1>

    <div class="controls">
        <div style="width: 100%;">
            <div class="tabs">
                <a href="index.html" class="tab-btn">이미지로 만들기</a>
                <a href="text.html" class="tab-btn active">글자로 만들기</a>
                <a href="manual.html" class="tab-btn">직접 만들기</a>
            </div>
        </div>

        <!-- 텍스트 입력 섹션 -->
        <div style="display: flex; flex-wrap: wrap; gap: 15px; flex: 2; align-items: flex-end;">
            <div class="control-group" style="flex-grow: 1;">
                <label>텍스트 입력</label>
                <input type="text" id="input-text" placeholder="HELLO" value="LOVE">
            </div>
            <div class="control-group">
                <label>글씨체</label>
                <select id="font-family">
                    <option value="sans-serif">기본 (고딕)</option>
                    <option value="serif">세리프 (명조)</option>
                    <option value="monospace">고정폭</option>
                    <option value="cursive">필기체</option>
                </select>
            </div>
            <div class="control-group">
                <label>글씨색</label>
                <input type="color" id="font-color" value="#000000">
            </div>
        </div>

        <!-- 공통 설정 -->
        <div class="control-group">
            <label>가로 코 수</label>
            <input type="number" id="grid-width" value="30" min="5" max="100">
        </div>
        <div class="control-group">
            <label>세로 코 수</label>
            <input type="number" id="grid-height" value="30" min="5" max="100">
        </div>

        <div class="control-group">
            <button onclick="runProcess()">도안 생성</button>
        </div>
        <div class="control-group">
            <button class="secondary" onclick="downloadPattern()">다운로드</button>
        </div>
        <div class="control-group">
            <button class="secondary" onclick="saveProject()">프로젝트 저장</button>
        </div>
        <div class="control-group">
            <button class="secondary" onclick="loadProject()">프로젝트 불러오기</button>
        </div>
        <div class="control-group">
            <button class="secondary" onclick="undo()">실행 취소</button>
        </div>
        <div class="control-group">
            <button class="secondary" id="eraser-btn" onclick="toggleEraser()">지우개</button>
        </div>
        <div class="control-group">
            <label>칠하기 색상</label>
            <input type="color" id="paint-color" value="#ff6b6b">
        </div>
        <div class="control-group" style="width: 100%;" id="palette-group">
            <label>사용된 색상</label>
            <div id="palette-container" class="palette-container"></div>
            <label style="margin-top: 10px; display:block;">추가된 색상</label>
            <div id="added-palette-container" class="palette-container"></div>
        </div>
    </div>

    <div id="pattern-container">
        <p style="color: #999;">텍스트를 입력하고 '도안 생성'을 누르세요.</p>
    </div>
</div>

<script src="script.js"></script>
<script>
    function runProcess() {
        const width = parseInt(document.getElementById('grid-width').value);
        const height = parseInt(document.getElementById('grid-height').value);
        const text = document.getElementById('input-text').value;
        const fontFamily = document.getElementById('font-family').value;
        const fontColor = document.getElementById('font-color').value;

        if (!text) return alert('텍스트를 입력해주세요!');

        const tempCanvas = document.createElement('canvas');
        const ctx = tempCanvas.getContext('2d');
        const fontStyle = `bold 100px ${fontFamily}`;
        ctx.font = fontStyle;
        const textMetrics = ctx.measureText(text);
        tempCanvas.width = textMetrics.width;
        tempCanvas.height = 100;
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        ctx.fillStyle = fontColor; ctx.font = fontStyle; ctx.textBaseline = 'top'; ctx.fillText(text, 0, 0);

        const img = new Image(); img.onload = () => createPixelCanvas(img, width, height, 'text', fontColor); img.src = tempCanvas.toDataURL();
    }
</script>
</body>
</html>
