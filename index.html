<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수뜨개 도안 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🧶 뜨개 도안 생성기</h1>

    <div class="controls">
        <div style="width: 100%;">
            <div class="tabs">
                <a href="index.html" class="tab-btn active">이미지로 만들기</a>
                <a href="text.html" class="tab-btn">글자로 만들기</a>
                <a href="manual.html" class="tab-btn">직접 만들기</a>
            </div>
        </div>

        <!-- 이미지 입력 섹션 -->
        <div class="control-group" style="flex: 2;">
            <label>이미지 업로드</label>
            <input type="file" id="upload-image" accept="image/*">
        </div>

        <!-- 공통 설정 -->
        <div class="control-group">
            <label>가로 코 수 (Width)</label>
            <input type="number" id="grid-width" value="30" min="5" max="100">
        </div>

        <div class="control-group">
            <label>세로 코 수 (Height)</label>
            <input type="number" id="grid-height" value="30" min="5" max="100">
        </div>

        <div class="control-group">
            <button onclick="runProcess()">도안 생성</button>
        </div>
        <div class="control-group" style="display: flex; gap: 5px;">
            <button class="secondary" onclick="downloadPattern()" style="flex: 1;">다운로드</button>
            <button class="secondary" onclick="saveProject()" style="flex: 1;">저장</button>
            <button class="secondary" onclick="loadProject()" style="flex: 1;">불러오기</button>
        </div>
        
        <!-- 편집 도구 -->
        <div class="control-group" style="display: flex; gap: 5px;">
            <button class="secondary" onclick="undo()" style="flex: 1;">실행 취소</button>
            <button class="secondary" id="eraser-btn" onclick="toggleEraser()" style="flex: 1;">지우개</button>
        </div>

        <div class="control-group">
            <label>칠하기 색상</label>
            <input type="color" id="paint-color" value="#ff6b6b" style="padding: 2px; height: 42px; width: 100%; border: 1px solid var(--border); border-radius: 5px; box-sizing: border-box;">
        </div>
        <div class="control-group" style="width: 100%;" id="palette-group">
            <label>사용된 색상 (클릭하여 선택)</label>
            <div id="palette-container" class="palette-container"></div>
            <label style="margin-top: 10px; display:block;">추가된 색상</label>
            <div id="added-palette-container" class="palette-container"></div>
        </div>
    </div>

    <div id="pattern-container">
        <p style="color: #999;">이미지를 업로드하고 '도안 생성'을 누르세요.</p>
    </div>
</div>

<script src="script.js"></script>
<script>
    function runProcess() {
        const width = parseInt(document.getElementById('grid-width').value);
        const height = parseInt(document.getElementById('grid-height').value);
        const fileInput = document.getElementById('upload-image');
        if (!fileInput.files || !fileInput.files[0]) {
            alert('이미지를 선택해주세요!');
            return;
        }
        const img = new Image();
        img.onload = function() {
            createPixelCanvas(img, width, height, 'image');
        };
        img.src = URL.createObjectURL(fileInput.files[0]);
    }
</script>
</body>
</html>
